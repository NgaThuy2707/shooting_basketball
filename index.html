<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Phân tích Dáng ném Bóng rổ AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; height: 100vh; overflow: hidden; }
        
        /* 1. Màn hình Đăng nhập */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        .login-box h2 { margin-bottom: 20px; color: #2c3e50; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .login-box button { width: 100%; padding: 10px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .login-box button:hover { background: #d35400; }

        /* 2. Giao diện chính */
        #main-layout { display: none; width: 100%; height: 100%; }
        .sidebar { width: 260px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h3 { margin-bottom: 10px; text-align: center; color: #e67e22; font-size: 20px; }
        .sidebar .version { text-align: center; font-size: 11px; color: #7f8c8d; margin-bottom: 30px; }
        
        .menu-btn { background: transparent; border: none; color: #ecf0f1; text-align: left; padding: 12px 15px; font-size: 15px; cursor: pointer; border-radius: 5px; margin-bottom: 8px; width: 100%; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .menu-btn:hover, .menu-btn.active { background: #34495e; color: #e67e22; font-weight: bold; padding-left: 20px; }
        .logout-btn { margin-top: auto; background: #c0392b; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center;}

        /* Vùng chứa nội dung động từ file nhỏ */
        .content-panel { flex: 1; padding: 35px; overflow-y: auto; }
        
        /* CSS dùng chung cho các trang con khi load vào */
        .page-header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .rn-badge { background: #e67e22; color: white; font-size: 12px; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        .page-desc { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .box-placeholder { background: white; border: 2px dashed #cbd5e1; padding: 40px; border-radius: 8px; text-align: center; color: #94a3b8; font-size: 16px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #e67e22; }
        .card h4 { color: #7f8c8d; font-size: 13px; text-transform: uppercase; }
        .card p { font-size: 24px; font-weight: bold; margin-top: 5px; color: #2c3e50; }
        .mock-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mock-table th, .mock-table td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .mock-table th { background: #f8fafc; color: #64748b; font-weight: 600; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Đăng Nhập</h2>
            <input type="text" id="username" placeholder="Tên đăng nhập (admin)">
            <input type="password" id="password" placeholder="Mật khẩu (123)">
            <button id="login-btn">Vào Hệ Thống</button>
        </div>
    </div>

    <div id="main-layout">
        <div class="sidebar">
            <h3>BASKETBALL AI</h3>
            <div class="version">Hệ thống Tách File Component</div>
            
            <button class="menu-btn active" onclick="switchPage('dashboard', 'dashboard.html')">📊 Tổng quan (Dashboard)</button>
            <button class="menu-btn" onclick="switchPage('analysis', 'analysis.html')">🎥 Phân tích dáng ném</button>
            <button class="menu-btn" onclick="switchPage('history', 'history.html')">📜 Lịch sử & Tiến độ</button>
            <button class="menu-btn" onclick="switchPage('classes', 'classes.html')">👥 Quản lý Lớp học (HLV)</button>
            <button class="menu-btn" onclick="switchPage('exercises', 'exercises.html')">📚 Thư viện Bài tập</button>
            <button class="menu-btn" onclick="switchPage('settings', 'settings.html')">⚙️ Cài đặt hệ thống</button>
            
            <button class="logout-btn" id="logout-btn">🔒 Đăng xuất</button>
        </div>

        <div class="content-panel" id="content-area"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
